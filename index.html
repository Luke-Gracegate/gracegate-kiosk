<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>GraceGate — Check In</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #0d1117;
      font-family: 'Georgia', serif;
      -webkit-user-select: none;
      user-select: none;
      touch-action: manipulation;
    }

    /* ── IFRAME ── */
    #form-frame {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* ── SCREENSAVER OVERLAY ── */
    #screensaver {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #080c14;
      opacity: 0;
      pointer-events: none;
      transition: opacity 1.2s ease;
      overflow: hidden;
    }

    #screensaver.visible {
      opacity: 1;
      pointer-events: all;
    }

    /* Animated background orbs */
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(90px);
      animation: drift 14s ease-in-out infinite alternate;
      opacity: 0.25;
    }
    .orb-1 {
      width: 600px; height: 600px;
      background: radial-gradient(circle, #1a4fa8, transparent);
      top: -150px; left: -150px;
      animation-duration: 18s;
    }
    .orb-2 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, #5b21b6, transparent);
      bottom: -100px; right: -100px;
      animation-duration: 22s;
      animation-delay: -8s;
    }
    .orb-3 {
      width: 350px; height: 350px;
      background: radial-gradient(circle, #0284c7, transparent);
      top: 35%; left: 25%;
      animation-duration: 13s;
      animation-delay: -4s;
    }

    @keyframes drift {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(50px, 35px) scale(1.12); }
    }

    /* Logo */
    .logo-wrap {
      position: relative;
      margin-bottom: 40px;
      animation: float 4s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50%       { transform: translateY(-14px); }
    }
    .logo-glow {
      position: absolute;
      inset: -24px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,0.1), transparent 70%);
      animation: pulse-glow 3s ease-in-out infinite;
    }
    @keyframes pulse-glow {
      0%, 100% { transform: scale(1); opacity: 0.5; }
      50%       { transform: scale(1.25); opacity: 1; }
    }
    .logo-img {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      display: block;
      position: relative;
      z-index: 1;
    }

    /* Text */
    .ss-title {
      font-size: clamp(1.8rem, 5vw, 3rem);
      font-weight: 400;
      letter-spacing: 0.1em;
      color: #ffffff;
      text-align: center;
      margin-bottom: 10px;
      text-shadow: 0 0 40px rgba(255,255,255,0.25);
    }
    .ss-subtitle {
      font-size: clamp(0.75rem, 2vw, 1rem);
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
      text-align: center;
      margin-bottom: 56px;
    }

    /* Divider */
    .divider {
      width: 1px;
      height: 40px;
      background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.2), transparent);
      margin: 0 auto 48px;
    }

    /* Buttons */
    .btn-row {
      display: flex;
      gap: 20px;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      padding: 0 24px;
    }

    .btn {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px 36px;
      border-radius: 60px;
      border: none;
      font-family: 'Georgia', serif;
      font-size: clamp(0.9rem, 2.5vw, 1.05rem);
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      text-decoration: none;
      white-space: nowrap;
    }
    .btn:active {
      transform: scale(0.96);
    }

    .btn-primary {
      background: #ffffff;
      color: #0a0f1e;
      box-shadow: 0 0 30px rgba(255,255,255,0.15);
    }
    .btn-primary:hover {
      box-shadow: 0 0 40px rgba(255,255,255,0.3);
      transform: translateY(-2px);
    }

    .btn-secondary {
      background: transparent;
      color: rgba(255,255,255,0.75);
      border: 1px solid rgba(255,255,255,0.2);
      box-shadow: 0 0 20px rgba(255,255,255,0.04);
    }
    .btn-secondary:hover {
      border-color: rgba(255,255,255,0.4);
      color: #ffffff;
      transform: translateY(-2px);
    }

    /* Bottom tap hint */
    .tap-hint {
      position: absolute;
      bottom: 36px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.65rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.2);
      animation: fade-pulse 3s ease-in-out infinite;
    }
    @keyframes fade-pulse {
      0%, 100% { opacity: 0.3; }
      50%       { opacity: 0.8; }
    }
  </style>
</head>

    <div class="ss-title">GraceGate Church</div>
    <div class="ss-subtitle">North Shore · Auckland</div>

    <div class="divider"></div>

    <div class="btn-row">
      <button class="btn btn-primary" id="btn-checkin">
        ✦ Check In
      </button>
      <button class="btn btn-secondary" id="btn-website">
        Visit Website
      </button>

    <div class="tap-hint">Tap to continue</div>

  <script>
    const IDLE_MS = 2 * 60 * 1000; // 2 minutes
    let idleTimer = null;
    const screensaver = document.getElementById('screensaver');
    const frame = document.getElementById('form-frame');
    const btnCheckin = document.getElementById('btn-checkin');
    const btnWebsite = document.getElementById('btn-website');

    function showScreensaver() {
      screensaver.classList.add('visible');
    }

    function loadCheckin() {
      frame.src = 'https://gracegatechurch.churchcenter.com/people/forms/410278';
      screensaver.classList.remove('visible');
      resetTimer();
    }

    function loadWebsite() {
      frame.src = 'https://www.gracegate.org.nz/';
      screensaver.classList.remove('visible');
      resetTimer();
    }

    function resetTimer() {
      clearTimeout(idleTimer);
      idleTimer = setTimeout(showScreensaver, IDLE_MS);
    }

    btnCheckin.addEventListener('click', loadCheckin);
    btnCheckin.addEventListener('touchstart', loadCheckin, { passive: true });

    btnWebsite.addEventListener('click', loadWebsite);
    btnWebsite.addEventListener('touchstart', loadWebsite, { passive: true });

    // Reset timer on any user interaction with the page
    ['touchstart', 'touchmove', 'mousedown', 'mousemove', 'keydown', 'scroll'].forEach(evt => {
      document.addEventListener(evt, () => {
        if (!screensaver.classList.contains('visible')) resetTimer();
      }, { passive: true });
    });

    // Start on check-in form by default
    resetTimer();
  </script>
