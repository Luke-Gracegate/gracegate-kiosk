<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>GraceGate — Check In</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #0d1117;
      font-family: 'Georgia', serif;
      -webkit-user-select: none;
      user-select: none;
      touch-action: manipulation;
    }

    /* ── IFRAME ── */
    #form-frame {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* ── SCREENSAVER OVERLAY ── */
    #screensaver {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0a0f1e;
      opacity: 0;
      pointer-events: none;
      transition: opacity 1.2s ease;
      overflow: hidden;
    }

    #screensaver.visible {
      opacity: 1;
      pointer-events: all;
    }

    /* Animated background orbs */
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      animation: drift 14s ease-in-out infinite alternate;
      opacity: 0.35;
    }
    .orb-1 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, #1a4fa8, transparent);
      top: -100px; left: -100px;
      animation-duration: 16s;
    }
    .orb-2 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, #7c3aed, transparent);
      bottom: -80px; right: -80px;
      animation-duration: 20s;
      animation-delay: -6s;
    }
    .orb-3 {
      width: 300px; height: 300px;
      background: radial-gradient(circle, #0ea5e9, transparent);
      top: 40%; left: 30%;
      animation-duration: 12s;
      animation-delay: -3s;
    }

    @keyframes drift {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(60px, 40px) scale(1.15); }
    }

    /* Cross / logo mark */
    .cross-wrap {
      position: relative;
      margin-bottom: 48px;
      animation: float 4s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50%       { transform: translateY(-12px); }
    }
    .cross {
      width: 64px;
      height: 64px;
      position: relative;
    }
    .cross::before, .cross::after {
      content: '';
      position: absolute;
      background: white;
      border-radius: 3px;
    }
    .cross::before {
      width: 12px; height: 64px;
      left: 50%; top: 0;
      transform: translateX(-50%);
    }
    .cross::after {
      width: 48px; height: 12px;
      left: 50%; top: 22%;
      transform: translateX(-50%);
    }
    .cross-glow {
      position: absolute;
      inset: -20px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,0.12), transparent 70%);
      animation: pulse-glow 3s ease-in-out infinite;
    }
    @keyframes pulse-glow {
      0%, 100% { transform: scale(1); opacity: 0.6; }
      50%       { transform: scale(1.2); opacity: 1; }
    }

    /* Text */
    .ss-title {
      font-size: clamp(2rem, 6vw, 3.5rem);
      font-weight: 400;
      letter-spacing: 0.08em;
      color: #ffffff;
      text-align: center;
      margin-bottom: 12px;
      text-shadow: 0 0 40px rgba(255,255,255,0.3);
    }
    .ss-subtitle {
      font-size: clamp(0.9rem, 2.5vw, 1.2rem);
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.45);
      text-align: center;
      margin-bottom: 64px;
    }

    /* Tap prompt */
    .tap-prompt {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      animation: fade-pulse 2.5s ease-in-out infinite;
    }
    @keyframes fade-pulse {
      0%, 100% { opacity: 0.5; }
      50%       { opacity: 1; }
    }
    .tap-ring {
      width: 56px; height: 56px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.4);
      display: flex; align-items: center; justify-content: center;
    }
    .tap-dot {
      width: 14px; height: 14px;
      border-radius: 50%;
      background: white;
    }
    .tap-label {
      font-size: 0.75rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
    }

    /* Thin decorative line */
    .divider {
      width: 1px;
      height: 48px;
      background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.3), transparent);
      margin: 0 auto 40px;
    }
  </style>
</head>
<body>

  <!-- The form -->
  <iframe
    id="form-frame"
    src="https://gracegatechurch.churchcenter.com/people/forms/410278"
    allow="camera; microphone"
    title="GraceGate Check-In Form"
  ></iframe>

  <!-- Screensaver -->
  <div id="screensaver">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <div class="cross-wrap">
      <div class="cross-glow"></div>
      <div class="cross"></div>
    </div>

    <div class="ss-title">GraceGate Church</div>
    <div class="ss-subtitle">Welcome</div>

    <div class="divider"></div>

    <div class="tap-prompt">
      <div class="tap-ring"><div class="tap-dot"></div></div>
      <div class="tap-label">Tap to check in</div>
    </div>
  </div>

  <script>
    const IDLE_MS = 2 * 60 * 1000; // 2 minutes
    let idleTimer = null;
    const screensaver = document.getElementById('screensaver');
    const frame = document.getElementById('form-frame');

    function showScreensaver() {
      screensaver.classList.add('visible');
    }

    function hideScreensaverAndRefresh() {
      // Reload the iframe to reset the form
      frame.src = frame.src;
      screensaver.classList.remove('visible');
      resetTimer();
    }

    function resetTimer() {
      clearTimeout(idleTimer);
      idleTimer = setTimeout(showScreensaver, IDLE_MS);
    }

    // Tap on screensaver dismisses it and reloads form
    screensaver.addEventListener('click', hideScreensaverAndRefresh);
    screensaver.addEventListener('touchstart', hideScreensaverAndRefresh, { passive: true });

    // Reset timer on any user interaction with the page
    ['touchstart', 'touchmove', 'mousedown', 'mousemove', 'keydown', 'scroll'].forEach(evt => {
      document.addEventListener(evt, () => {
        if (!screensaver.classList.contains('visible')) resetTimer();
      }, { passive: true });
    });

    // Kick it off
    resetTimer();
  </script>

</body>
</html>
